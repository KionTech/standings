name: security

on:
  push:
    branches:
      - main
    paths:
      - composer.lock
      - package-lock.json
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Audit Composer Dependencies
        run: composer audit --locked

      - name: Audit NPM Dependencies
        run: npm audit --audit-level=high
